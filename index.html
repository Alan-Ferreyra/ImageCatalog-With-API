<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 48px 24px;
      color: #e6edf3;
    }

    .container { max-width: 900px; margin: 0 auto; }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #7d8590;
      font-size: 14px;
      margin-top: 6px;
    }

    .search-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 140px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7d8590;
    }

    input {
      background: #0d1117;
      border: 1.5px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus { border-color: #6c63ff; }
    input::placeholder { color: #484f58; }

    button#buscar {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      height: 42px;
    }

    button#buscar:hover { background: #574fd6; }

    #resultado {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    #resultado li {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    #resultado li img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    #resultado li p {
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #3fb950;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>🛍️ Cadastro De Produtos</h1>
      <p>Digite o produto e o preço para adicionar à lista</p>
    </header>

    <div class="search-card">
      <div class="field">
        <label for="produto">Produto</label>
        <input type="text" id="produto" placeholder="Ex: camiseta, tênis...">
      </div>
      <div class="field" style="max-width: 160px;">
        <label for="preco">Preço (R$)</label>
        <input type="number" id="preco" placeholder="0,00">
      </div>
      <button id="buscar">Buscar Imagem</button>
    </div>

    <ul id="resultado"></ul>

  </div>

  <script src="./index.js" type="module"></script>
</body>
</html>
